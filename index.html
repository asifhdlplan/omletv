<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stranger Chat 😶</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

#chat {
  width: 90%;
  max-width: 500px;
  height: 300px;
  margin: 20px auto;
  background: #1e293b;
  overflow-y: auto;
  padding: 10px;
  border-radius: 10px;
  text-align: left;
}

input {
  width: 70%;
  padding: 10px;
}

button {
  padding: 10px;
  margin: 5px;
  cursor: pointer;
}

.msg {
  margin: 5px 0;
}
</style>
</head>

<body>

<h1>👤 Anonymous Chat</h1>

<button onclick="findStranger()">Find Stranger</button>

<div id="chat"></div>

<input id="msgInput" placeholder="Type message..." />
<button onclick="sendMsg()">Send</button>

<script>
let strangerName = "";
let connected = false;

function randomName() {
  return "Stranger#" + Math.floor(Math.random() * 10000);
}

function findStranger() {
  strangerName = randomName();
  connected = true;
  document.getElementById("chat").innerHTML = 
    "<div class='msg'>✅ Connected with " + strangerName + "</div>";
}

function sendMsg() {
  let input = document.getElementById("msgInput");
  let msg = input.value;

  if (!connected) {
    alert("Find a stranger first!");
    return;
  }

  if (msg.trim() === "") return;

  let chat = document.getElementById("chat");

  chat.innerHTML += "<div class='msg'><b>You:</b> " + msg + "</div>";

  // Fake reply
  setTimeout(() => {
    chat.innerHTML += "<div class='msg'><b>" + strangerName + ":</b> " + fakeReply() + "</div>";
    chat.scrollTop = chat.scrollHeight;
  }, 1000);

  input.value = "";
}

function fakeReply() {
  const replies = [
    "Hi 😄",
    "Where are you from?",
    "Lol 😂",
    "That's interesting...",
    "Tell me more 👀",
    "I agree!",
    "Haha nice one"
  ];
  return replies[Math.floor(Math.random() * replies.length)];
}
</script>

</body>
</html>
