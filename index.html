<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OmleTV - Anonymous Chat</title>

<style>
body {
  margin: 0;
  font-family: Arial;
  background: #0f172a;
  color: white;
  text-align: center;
}

h1 {
  margin-top: 20px;
}

#chat {
  width: 90%;
  max-width: 500px;
  height: 350px;
  margin: 20px auto;
  background: #1e293b;
  overflow-y: auto;
  padding: 10px;
  border-radius: 10px;
  text-align: left;
}

.msg {
  margin: 8px 0;
}

input {
  width: 65%;
  padding: 10px;
  border: none;
  border-radius: 5px;
}

button {
  padding: 10px 15px;
  margin: 5px;
  border: none;
  border-radius: 5px;
  cursor: pointer;
  background: #22c55e;
  color: black;
  font-weight: bold;
}

#status {
  margin-top: 10px;
  font-size: 14px;
  color: #94a3b8;
}
</style>
</head>

<body>

<h1>👤 OmleTV</h1>

<div id="status">Click "Find Stranger" to start</div>

<button onclick="findStranger()">Find Stranger</button>

<div id="chat"></div>

<div>
  <input id="msgInput" placeholder="Type your message..." />
  <button onclick="sendMsg()">Send</button>
</div>

<script>
let connected = false;

function findStranger() {
  connected = true;

  document.getElementById("chat").innerHTML =
    "<div class='msg'>🤖 Connected to Stranger</div>";

  document.getElementById("status").innerText = "Connected";
}

async function sendMsg() {
  let input = document.getElementById("msgInput");
  let msg = input.value;

  if (!connected) {
    alert("Find a stranger first!");
    return;
  }

  if (msg.trim() === "") return;

  let chat = document.getElementById("chat");

  // Show user message
  chat.innerHTML += "<div class='msg'><b>You:</b> " + msg + "</div>";
  chat.scrollTop = chat.scrollHeight;

  input.value = "";

  // Typing indicator
  let typing = document.createElement("div");
  typing.innerHTML = "<b>Stranger:</b> typing...";
  typing.id = "typing";
  chat.appendChild(typing);
  chat.scrollTop = chat.scrollHeight;

  try {
    let res = await fetch("/api/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: msg })
    });

    let data = await res.json();

    document.getElementById("typing").remove();

    chat.innerHTML += "<div class='msg'><b>Stranger:</b> " + data.reply + "</div>";
    chat.scrollTop = chat.scrollHeight;

  } catch (err) {
    document.getElementById("typing").remove();

    chat.innerHTML += "<div class='msg'><b>Stranger:</b> ⚠️ AI not responding</div>";
  }
}
</script>

</body>
</html>
